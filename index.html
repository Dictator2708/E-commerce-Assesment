<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickCart Dashboard</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">QuickCart</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <form class="d-flex ms-auto my-2 my-lg-0" onsubmit="event.preventDefault();">
                    <input class="form-control me-2" type="search" id="searchInput" placeholder="Search products..." aria-label="Search">
                </form>
                <div class="d-flex ms-3 align-items-center text-white">
                    <span>Cart: <span id="cartCount" class="badge bg-primary">0</span></span>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container my-4">
        <!-- Controls -->
        <div class="row mb-4">
            <div class="col-md-6 mb-2">
                <select id="categoryFilter" class="form-select">
                    <option value="all">All Categories</option>
                    <!-- Categories will be added dynamically -->
                </select>
            </div>
            <div class="col-md-6 mb-2">
                <select id="sortOption" class="form-select">
                    <option value="default">Default Sorting</option>
                    <option value="lowToHigh">Price: Low to High</option>
                    <option value="highToLow">Price: High to Low</option>
                </select>
            </div>
        </div>

        <!-- Messages -->
        <div id="loadingMessage" class="text-center my-5" style="display: none;">
            <h4>Loading...</h4>
        </div>
        <div id="errorMessage" class="text-center my-5 text-danger" style="display: none;">
            <h4>Failed to load products</h4>
        </div>

        <!-- Products Grid -->
        <div class="row" id="productsContainer">
            <!-- Product cards will be injected here by JavaScript -->
        </div>
    </div>

    <!-- Product Details Modal -->
    <div class="modal fade" id="productModal" tabindex="-1" aria-labelledby="productModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="productModalLabel">Product Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="productModalBody">
                    <!-- Modal content -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
